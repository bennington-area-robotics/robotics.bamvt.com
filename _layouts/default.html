<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  {% if page.og_image %}<meta property="og:image" content="{{ page.og_image | absolute_url }}">{% endif %}
  <meta name="twitter:card" content="{% if page.og_image %}summary_large_image{% else %}summary{% endif %}">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  {% if page.og_image %}<meta name="twitter:image" content="{{ page.og_image | absolute_url }}">{% endif %}
  <link rel="icon" type="image/png" href="/images/chip-32x32-round.png">
  <link rel="apple-touch-icon" href="/images/chip-180x180-round.png">
  <style>
    :root {
      --primary: #6d87b8
      --accent: #e63946;
      --bg: #fafafa;
      --text: #333;
      --link: #6d87b8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 1rem 0;
      margin-bottom: 1rem;
    }
    header .container {
      padding-top: 1rem;
      padding-bottom: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.75rem;
    }
    header p {
      margin: 0.5rem 0 0;
      opacity: 0.9;
    }
    main h2 {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 0.3rem;
      margin-top: 2rem;
    }
    main h2:first-child {
      margin-top: 0;
    }
    a {
      color: var(--link);
    }
    a:hover {
      color: var(--accent);
    }
    ul {
      padding-left: 1.5rem;
    }
    li {
      margin-bottom: 0.5rem;
    }
    .highlight {
      background: #f6dab1;
      border-left: 4px solid #e8b96d;
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 0 4px 4px 0;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      font-size: 0.9rem;
      color: #666;
    }
    nav a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      margin-right: 1.25rem;
      padding-bottom: 0.25rem;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover {
      color: white;
      border-bottom-color: rgba(255, 255, 255, 0.5);
    }
    nav a.active {
      color: white;
      border-bottom-color: white;
    }
    /* Table styling */
    table {
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.95rem;
    }
    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: var(--primary);
      color: white;
      font-weight: 600;
    }
    tr:nth-child(even) {
      background: #f5f5f5;
    }
    tr:hover {
      background: #e8f4f8;
    }
    /* Keep header row from changing on hover */
    thead tr:hover {
      background: var(--primary);
    }
    /* Highlight rows containing bold text */
    tr:has(strong) td:first-child {
      border-left: 4px solid var(--primary);
      padding-left: calc(1rem - 4px);
    }
    /* Carousel */
    .carousel {
      position: relative;
      margin: 1.5rem 0;
    }
    .carousel-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      gap: 0;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .carousel-track::-webkit-scrollbar {
      display: none;
    }
    .carousel-slide {
      flex: 0 0 100%;
      scroll-snap-align: center;
      aspect-ratio: 3 / 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border-radius: 4px;
      z-index: 1;
      line-height: 1;
    }
    .carousel-btn:hover {
      background: rgba(0, 0, 0, 0.7);
    }
    .carousel-btn.prev { left: 0.5rem; }
    .carousel-btn.next { right: 0.5rem; }
    /* Donation feed */
    .donation-progress {
      margin: 1rem 0 1.5rem;
    }
    .donation-progress .raised {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }
    .donation-progress .goal {
      color: #666;
      font-size: 0.95rem;
    }
    .donation-progress-bar {
      background: #e0e0e0;
      border-radius: 999px;
      height: 10px;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .donation-progress-bar .fill {
      background: linear-gradient(90deg, var(--primary), #2a9d8f);
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s;
    }
    .donation-feed {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .donation-feed li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
      margin: 0;
    }
    .donation-feed li:last-child {
      border-bottom: none;
    }
    .donation-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .donation-detail {
      flex: 1;
      min-width: 0;
    }
    .donation-detail .donor-name {
      font-weight: 700;
      color: var(--text);
    }
    .donation-detail .donation-amount {
      font-weight: 700;
      color: var(--primary);
    }
    .donation-detail .donation-meta {
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="{{ '/' | relative_url }}" style="color: white; text-decoration: none;">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav style="margin-top: 0.75rem;">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/events' | relative_url }}" {% if page.url contains 'events' %}class="active"{% endif %}>Events</a>
        <a href="{{ '/sponsors' | relative_url }}" {% if page.url == '/sponsors' or page.url == '/sponsors.html' %}class="active"{% endif %}>Sponsors</a>
        <a href="{{ '/donate' | relative_url }}" {% if page.url == '/donate' or page.url == '/donate.html' %}class="active"{% endif %}>Donate</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="container">
    <p>
      &copy; {{ 'now' | date: "%Y" }} Bennington Area Robotics
      &nbsp;&middot;&nbsp;
      <a href="https://www.youtube.com/@bennington-area-robotics" target="_blank" rel="noopener">YouTube</a>
      &nbsp;&middot;&nbsp;
      <a href="https://github.com/bennington-area-robotics" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>
</body>
</html>
